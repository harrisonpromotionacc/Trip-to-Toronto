<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 爸媽多倫多之旅 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #FFD1DC; --hot-pink: #FF8FA3; --blue: #A2D2FF; --text: #5D5D5D; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #FFF9FA; margin: 0; padding: 0; color: var(--text); overflow-x: hidden; }
        
        /* Header */
        .header { background: var(--pink); padding: 20px 15px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        
        /* 左右捲動日期欄 */
        .scroll-wrapper { background: white; padding: 15px 0; overflow-x: auto; white-space: nowrap; display: flex; gap: 10px; padding-left: 15px; -webkit-overflow-scrolling: touch; }
        .scroll-wrapper::-webkit-scrollbar { display: none; } /* 隱藏 scrollbar */
        
        .date-item { display: inline-block; min-width: 65px; padding: 10px; border-radius: 15px; border: 2px solid var(--pink); text-align: center; background: white; cursor: pointer; transition: 0.3s; }
        .date-item.active { background: var(--hot-pink); border-color: var(--hot-pink); color: white; transform: scale(1.05); }
        .date-item .wkday { font-size: 12px; margin-bottom: 5px; }
        .date-item .daynum { font-size: 18px; font-weight: bold; }
        .today-tag { font-size: 10px; background: #FF4D6D; color: white; padding: 2px 5px; border-radius: 5px; margin-top: 2px; display: inline-block; }

        .container { padding: 15px; }
        .home-btn { background: var(--hot-pink); color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-size: 20px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(255,143,163,0.4); text-decoration: none; border: none; }
        
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px solid var(--pink); }
        .event { border-left: 4px solid var(--blue); padding-left: 15px; margin-bottom: 25px; position: relative; }
        .time { font-size: 15px; color: #7aa7ff; font-weight: bold; margin-bottom: 5px; }
        .desc { font-size: 19px; font-weight: bold; line-height: 1.4; color: #333; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 13px; margin-right: 5px; color: white; font-weight: bold; margin-top: 8px; }
        .tag-eat { background: #FFA500; } .tag-buy { background: #FF69B4; } .tag-tip { background: #4CC9F0; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1 style="color:white; margin:0; font-size: 22px;">🌸 多倫多旅遊小助手 🌸</h1>
        </div>

        <div class="scroll-wrapper" id="dateScroll">
            <div v-for="(d, i) in days" :key="i" 
                 :class="['date-item', currentIdx === i ? 'active' : '']"
                 @click="currentIdx = i">
                <div class="wkday">{{d.weekday}}</div>
                <div class="daynum">{{d.dateShort}}</div>
                <div v-if="d.isToday" class="today-tag">今日</div>
            </div>
        </div>

        <div class="container">
            <button @click="goHome" class="home-btn">
                <i class="fas fa-home"></i> 帶我回屋企 (145 Canon)
            </button>

            <div class="card">
                <h3 style="margin-top:0; color: var(--hot-pink); border-bottom: 2px solid var(--pink); padding-bottom: 10px;">
                    📍 {{days[currentIdx].fullDate}} 行程
                </h3>
                <div v-for="(ev, idx) in days[currentIdx].events" :key="idx" class="event">
                    <div class="time"><i class="far fa-clock"></i> {{ev.timeRange}}</div>
                    <div class="desc">{{ev.desc}}</div>
                    <div v-if="ev.tags">
                        <span v-for="t in ev.tags" :class="['tag', 'tag-'+t.type]">{{t.label}}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    currentIdx: 0,
                    days: [
                        { fullDate: "6月29日", dateShort: "29/6", weekday: "一", isToday: false, events: [{ timeRange: "09:00 - 12:00", desc: "抵達機場 & 接機" }, { timeRange: "13:00 - 15:00", desc: "屋企附近熟悉環境", tags: [{type:'tip', label:'買日用品'}] }] },
                        { fullDate: "6月30日", dateShort: "30/6", weekday: "二", isToday: false, events: [{ timeRange: "12:00 - 14:00", desc: "吃中餐 (粥/中式餐廳)" }, { timeRange: "14:00 - 18:00", desc: "在家休息調整時差" }] },
                        { fullDate: "7月1日", dateShort: "1/7", weekday: "三", isToday: false, events: [{ timeRange: "13:00 - 16:00", desc: "市中心熱點: 伊頓中心 / 多倫多路牌", tags: [{type:'buy', label:'必買: Roots'}] }, { timeRange: "16:00 - 18:00", desc: "聖羅倫斯市場逛街", tags: [{type:'eat', label:'必吃: 培根捲'}] }] },
                        { fullDate: "7月4日", dateShort: "4/7", weekday: "六", isToday: false, events: [{ timeRange: "12:00 - 14:00", desc: "尼亞加拉大瀑布 - 坐船", tags: [{type:'tip', label:'準備雨衣'}] }, { timeRange: "14:00 - 17:00", desc: "遊客區觀光", tags: [{type:'eat', label:'景觀餐廳'}] }] },
                        { fullDate: "7月5日", dateShort: "5/7", weekday: "日", isToday: false, events: [{ timeRange: "14:00 - 17:00", desc: "前往採摘車利子 (Cherry)", tags: [{type:'buy', label:'手信: 果醬'}] }] },
                        { fullDate: "7月11日", dateShort: "11/7", weekday: "六", isToday: false, events: [{ timeRange: "13:00 - 17:00", desc: "太古廣場購物 (Pacific Mall)", tags: [{type:'eat', label:'港式美食'}] }] },
                        { fullDate: "7月12日", dateShort: "12/7", weekday: "日", isToday: false, events: [{ timeRange: "13:00 - 16:00", desc: "士嘉堡大斷崖 (Scarborough Bluffs)", tags: [{type:'tip', label:'影相打卡'}] }] },
                        { fullDate: "7月16日", dateShort: "16/7", weekday: "四", isToday: false, events: [{ timeRange: "13:00 - 17:00", desc: "多倫多動物園", tags: [{type:'tip', label:'行好多路'}] }] },
                        { fullDate: "7月21日", dateShort: "21/7", weekday: "二", isToday: false, events: [{ timeRange: "12:00 - 15:00", desc: "起程前往機場回港", tags: [{type:'tip', label:'帶齊證件'}] }] }
                    ]
                }
            },
            mounted() {
                this.checkToday();
            },
            methods: {
                checkToday() {
                    const today = new Date();
                    const tMonth = today.getMonth() + 1;
                    const tDate = today.getDate();
                    
                    this.days.forEach((day, index) => {
                        // 簡單邏輯判定今日 (例如: "6/29" 格式)
                        const parts = day.dateShort.split('/');
                        if(parseInt(parts[0]) === tDate && parseInt(parts[1]) === tMonth) {
                            day.isToday = true;
                            this.currentIdx = index; // 自動跳轉到今日行程
                        }
                    });
                },
                goHome() {
                    const destination = encodeURIComponent("145 Canon Jackson Drive, Toronto");
                    window.location.href = `https://www.google.com/maps/dir/?api=1&destination=${destination}&travelmode=walking`;
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
