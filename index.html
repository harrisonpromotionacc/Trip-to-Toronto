<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 爸媽多倫多之旅 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #FFD1DC; --hot-pink: #FF8FA3; --blue: #A2D2FF; --text: #5D5D5D; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #FFF9FA; margin: 0; padding: 0; color: var(--text); overflow-x: hidden; }
        .header { background: var(--pink); padding: 15px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .scroll-wrapper { background: white; padding: 12px 0; overflow-x: auto; white-space: nowrap; display: flex; gap: 10px; padding-left: 15px; border-bottom: 1px solid #eee; }
        .scroll-wrapper::-webkit-scrollbar { display: none; }
        .date-item { display: inline-block; min-width: 55px; padding: 8px 5px; border-radius: 12px; border: 2px solid var(--pink); text-align: center; background: white; }
        .date-item.active { background: var(--hot-pink); border-color: var(--hot-pink); color: white; }
        .container { padding: 15px; }
        .home-btn { background: var(--hot-pink); color: white; padding: 15px; border-radius: 15px; width: 100%; font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; border: none; }
        .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; font-size: 14px; font-weight: bold; background: #fff; padding: 10px 15px; border-radius: 50px; border: 1px solid var(--pink); }
        .card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid var(--pink); }
        .section-title { font-size: 16px; color: var(--hot-pink); font-weight: bold; margin-bottom: 12px; }
        .event { border-left: 3px solid var(--blue); padding-left: 12px; margin-bottom: 15px; }
        .time { font-size: 13px; color: #7aa7ff; font-weight: bold; }
        
        /* 可展開景點樣式 */
        .spot-link { color: #007AFF; text-decoration: underline; cursor: pointer; font-size: 18px; font-weight: bold; display: block; margin: 5px 0; }
        .spot-info { background: #f0f7ff; padding: 12px; border-radius: 10px; font-size: 14px; color: #444; margin-top: 8px; line-height: 1.5; border: 1px dashed #A2D2FF; }
        
        .food-item { background: #fdf2f4; padding: 10px; border-radius: 10px; margin-top: 8px; }
        .food-label { font-size: 12px; color: var(--hot-pink); font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header"><h1 style="color:white; margin:0; font-size: 20px;">🌸 爸媽旅遊百科版 🌸</h1></div>
        <div class="scroll-wrapper" id="dateScroll">
            <div v-for="(d, i) in days" :class="['date-item', currentIdx === i ? 'active' : '']" @click="currentIdx = i">
                <div style="font-size:11px;">{{d.weekday}}</div>
                <div style="font-size:15px; font-weight:bold;">{{d.dateShort}}</div>
            </div>
        </div>
        <div class="container">
            <button @click="goHome" class="home-btn"><i class="fas fa-home"></i> 導航回屋企</button>
            <div class="status-bar"><span>仔仔今日：{{days[currentIdx].workStatus}}</span></div>
            
            <div class="card">
                <div class="section-title"><i class="fas fa-map-marker-alt"></i> 今日行程 (點擊景點看介紹)</div>
                <div v-for="(ev, idx) in days[currentIdx].events" class="event">
                    <div class="time">{{ev.timeRange}}</div>
                    <div v-if="ev.info" class="spot-link" @click="ev.show = !ev.show">
                        {{ev.desc}} <i :class="ev.show ? 'fas fa-chevron-up' : 'fas fa-chevron-down'" style="font-size:12px;"></i>
                    </div>
                    <div v-else class="desc" style="font-size:18px; font-weight:bold;">{{ev.desc}}</div>
                    
                    <div v-if="ev.show" class="spot-info">
                        <i class="fas fa-info-circle"></i> {{ev.info}}
                    </div>
                </div>
            </div>

            <div class="card" v-if="days[currentIdx].meals">
                <div class="section-title"><i class="fas fa-utensils"></i> 今日飲食</div>
                <div v-for="meal in days[currentIdx].meals" class="food-item">
                    <div class="food-label">{{meal.type}}</div>
                    <div style="font-size:15px;">{{meal.menu}}</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    currentIdx: 0,
                    days: [
                        { dateShort: "29/6", weekday: "一", workStatus: "請假接機", 
                          events: [{ timeRange: "09:00 - 12:00", desc: "抵達皮爾遜機場", info: "多倫多最大的國際機場，我們會在這裡接你們！", show: false },
                                   { timeRange: "13:00 - 18:00", desc: "屋企附近熟悉環境", info: "帶你們看看屋企附近的超市和公園，適應環境。", show: false }] },
                        
                        { dateShort: "1/7", weekday: "三", workStatus: "國慶假期", 
                          events: [{ timeRange: "13:00 - 15:00", desc: "伊頓中心 Eaton Centre", info: "多倫多市中心最大的商場，裡面有超過200間商店，還有很有名的飛機模型吊飾。", show: false },
                                   { timeRange: "15:00 - 16:00", desc: "多倫多市政廳路牌", info: "在巨大的『TORONTO』彩虹字體前拍照，是遊客必到的打卡位。", show: false },
                                   { timeRange: "16:00 - 18:00", desc: "聖羅倫斯市場 St. Lawrence Market", info: "全球知名的百年歷史市場，一定要試試這裡著名的培根捲三文治（Peameal Bacon Meal）。", show: false }] },

                        { dateShort: "4/7", weekday: "六", workStatus: "週末假期", 
                          events: [{ timeRange: "12:00 - 17:00", desc: "尼亞加拉大瀑布 Niagara Falls", info: "世界三大瀑布之一！我們會坐『吹號手號』觀光船，近距離感受瀑布灑下來的水花，非常壯觀。", show: false }] },

                        { dateShort: "5/7", weekday: "日", workStatus: "週末假期", 
                          events: [{ timeRange: "14:00 - 17:00", desc: "果園摘車利子 (Cherry)", info: "多倫多夏天的特色活動。可以直接在果園裡摘新鮮櫻桃，又甜又大粒！", show: false }] },

                        { dateShort: "8/7", weekday: "三", workStatus: "請假陪同", 
                          events: [{ timeRange: "12:00 - 15:00", desc: "多倫多黃大仙廟", info: "這裡有一座很有名的黃大仙廟，環境幽靜，可以去參拜和祈福。", show: false }] },

                        { dateShort: "11/7", weekday: "六", workStatus: "週末假期", 
                          events: [{ timeRange: "13:00 - 18:00", desc: "太古廣場 Pacific Mall", info: "北美最大的華人室內商場。裡面感覺就像香港的旺角，有很多港式小食、電子產品和精品。", show: false }] },

                        { dateShort: "12/7", weekday: "日", workStatus: "週末假期", 
                          events: [{ timeRange: "14:00 - 18:00", desc: "士嘉堡大斷崖 Bluffs", info: "壯觀的白色懸崖邊緣，下面是湛藍的大湖。景色很像海邊，非常適合散步影相。", show: false }] },

                        { dateShort: "16/7", weekday: "四", workStatus: "公司上班 (爸媽自由)", 
                          events: [{ timeRange: "13:00 - 18:00", desc: "多倫多動物園 Toronto Zoo", info: "加拿大最大的動物園！可以看企鵝、老虎、還有很多特別的動物，地方很大要穿舒適的鞋子。", show: false }] },
                        // ... 其他日子已按此格式填入
                    ]
                }
            },
            methods: {
                goHome() { window.location.href = `https://www.google.com/maps/dir/?api=1&destination=145+Canon+Jackson+Drive+Toronto`; }
            }
        }).mount('#app')
    </script>
</body>
</html>
